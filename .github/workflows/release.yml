name: Release Mach1

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.1, v1.2.3, etc.

permissions:
  contents: write     # needed to create GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          # ── macOS Intel ───────────────────────────────
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # ── macOS Apple Silicon ───────────────────────
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # ── Ubuntu / Debian ───────────────────────────
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: services/web-ui/src-tauri

      # ── Node.js ─────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web-ui/package-lock.json

      # ── Linux system deps ───────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      # ── npm install ─────────────────────────────────
      - name: Install frontend deps
        run: npm ci
        working-directory: services/web-ui

      # ── Tauri build + release ────────────────────────
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: services/web-ui
          tagName: ${{ github.ref_name }}
          releaseName: 'Mach1 MCP ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
