name: Release 1mcp.in

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Go tests must pass before releasing ─────────────
  go-test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/central-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/central-mcp/go.mod
          cache-dependency-path: services/central-mcp/go.sum
      - name: Sync registry-index into Go embed dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "cmd/mcpapiserver/data" | Out-Null
          Copy-Item "../../packages/registry-index/index.json" "cmd/mcpapiserver/data/registry-index.json" -Force
      - run: go test -race -timeout 60s ./...

  # ── Deploy mcpapiserver to Railway ──────────────────
  deploy-api:
    needs: go-test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy mcpapiserver
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service mcpapiserver --detach
        continue-on-error: true   # don't block desktop release if Railway deploy fails

  # ── Tauri desktop release (all platforms) ───────────
  tauri-release:
    needs: go-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            router_name: centralmcpd.exe
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            router_name: centralmcpd
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            router_name: centralmcpd
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            router_name: centralmcpd

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/central-mcp/go.mod
          cache-dependency-path: services/central-mcp/go.sum

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build bundled centralmcpd
        shell: pwsh
        working-directory: services/central-mcp
        run: |
          New-Item -ItemType Directory -Force -Path ../web-ui/src-tauri/resources | Out-Null
          $env:GOOS = "${{ matrix.goos }}"
          $env:GOARCH = "${{ matrix.goarch }}"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags "-s -w" -o "../web-ui/src-tauri/resources/${{ matrix.router_name }}" ./cmd/centralmcpd

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: services/web-ui/src-tauri

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web-ui/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend deps
        run: npm install
        working-directory: services/web-ui

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: services/web-ui
          tagName: ${{ github.ref_name }}
          releaseName: '1mcp.in ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Auto-update
            Open 1mcp.in — the app checks for updates on launch and in the background every 4 hours.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
