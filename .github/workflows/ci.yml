name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Go: lint, test, build ───────────────────────────
  go:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: services/central-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/central-mcp/go.mod
          cache-dependency-path: services/central-mcp/go.sum

      - name: Sync registry-index into Go embed dir
        run: |
          mkdir -p cmd/mcpapiserver/data
          cp ../../packages/registry-index/index.json cmd/mcpapiserver/data/registry-index.json

      - name: go vet
        run: go vet ./...

      - name: Verify signed registry catalog
        run: go run ./cmd/onemcpsignregistry --check --catalog ../../packages/registry-index/index.json

      - name: go test
        run: go test -race -timeout 60s ./...

      - name: Build binaries
        run: |
          go build ./cmd/centralmcpd
          go build ./cmd/mcpapiserver
          go build ./cmd/onemcpctl

  # ── Version consistency check ───────────────────────
  version-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          TAURI_VER=$(jq -r '.version' services/web-ui/src-tauri/tauri.conf.json)
          CARGO_VER=$(grep '^version' services/web-ui/src-tauri/Cargo.toml | head -1 | grep -oP '"\K[^"]+')
          echo "tauri.conf.json: $TAURI_VER"
          echo "Cargo.toml: $CARGO_VER"
          if [ "$TAURI_VER" != "$CARGO_VER" ]; then
            echo "::error::Version mismatch: tauri.conf.json=$TAURI_VER vs Cargo.toml=$CARGO_VER"
            exit 1
          fi

  # ── Tauri desktop app (compile check per platform) ──
  tauri:
    needs: [go, version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: services/web-ui/src-tauri

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web-ui/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend deps
        run: npm install
        working-directory: services/web-ui

      - name: Build Tauri app (no release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: services/web-ui
          args: ${{ matrix.args }}
